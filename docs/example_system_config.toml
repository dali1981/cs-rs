# Example System-wide Configuration for cs backtest
# Location: ~/.config/cs/system.toml
#
# This file provides default paths and settings for all backtests.
# Strategy-specific configs (--conf) override these settings.
#
# Configuration priority (highest to lowest):
# 1. CLI arguments (e.g., --spread straddle)
# 2. Strategy config file (--conf strategy.toml)
# 3. System config (~/.config/cs/system.toml) ← This file
# 4. Code defaults

# ============================================================================
# Paths
# ============================================================================
[paths]
data_dir = "~/polygon/data"
earnings_dir = "~/trading_project/nasdaq_earnings/data"

# ============================================================================
# Timing (Intraday Entry/Exit Times)
# ============================================================================
[timing]
# Entry time (market hours)
entry_hour = 10
entry_minute = 0

# Exit time (market hours)
exit_hour = 15
exit_minute = 45

# Generic timing specification (RECOMMENDED - NEW)
# Uncomment to set system-wide defaults for timing strategy
# timing_strategy = "PreEarnings"
# entry_days_before = 5
# exit_days_before = 1

# For PostEarnings strategy:
# timing_strategy = "PostEarnings"
# entry_offset = 0        # Days after earnings to enter
# holding_days = 5        # How many days to hold

# For CrossEarnings strategy (straddle earnings event):
# timing_strategy = "CrossEarnings"
# entry_days_before = 5   # Entry before earnings
# exit_days_after = 2     # Exit after earnings

# ============================================================================
# Selection Criteria (Option Expiration Filtering)
# ============================================================================
[selection]
min_short_dte = 3     # Minimum days to expiration for short leg
max_short_dte = 45    # Maximum days to expiration for short leg
min_long_dte = 14     # Minimum days to expiration for long leg
max_long_dte = 90     # Maximum days to expiration for long leg

# Optional: IV ratio filtering (long IV / short IV)
# min_iv_ratio = 0.8

# ============================================================================
# Strategy (Strike Selection)
# ============================================================================
[strategy]
# Strike selection method: "atm", "delta"
selection_type = "atm"

# For delta-based selection
target_delta = 0.50
delta_range = [0.25, 0.75]
delta_scan_steps = 5

# Wing width for iron butterfly (in dollars)
wing_width = 10.0

# LEGACY: Spread-specific timing (DEPRECATED - use timing_strategy instead)
# straddle_entry_days = 5
# straddle_exit_days = 1
# post_earnings_holding_days = 5

# ============================================================================
# Pricing
# ============================================================================
[pricing]
# Volatility interpolation model: "linear" or "svi"
vol_model = "linear"

# Pricing model (IV interpolation)
# model = "linear"  # or "cubic_spline"

# ============================================================================
# Filtering
# ============================================================================
# Uncomment to set system-wide filters

# Minimum market capitalization (in dollars)
# min_market_cap = 1_000_000_000  # $1 billion

# Maximum entry IV (filters out trades with unreliable pricing)
# max_entry_iv = 2.0  # 200%

# Minimum notional value
# min_notional = 100.0

# ============================================================================
# Hedging (Optional)
# ============================================================================
[hedging]
enabled = false

# Uncomment to enable hedging system-wide
# enabled = true
# strategy = "delta"           # "time", "delta", or "gamma"
# interval_hours = 24          # For time-based hedging
# delta_threshold = 0.10       # For delta-based hedging
# cost_per_share = 0.01        # Transaction cost
# delta_mode = "gamma"         # "gamma", "entry-hv", "current-iv", etc.
# hv_window = 20               # Historical volatility window (days)

# ============================================================================
# Attribution (P&L Analysis)
# ============================================================================
[attribution]
enabled = false

# Uncomment to enable attribution analysis system-wide
# enabled = true
# vol_source = "current_market_iv"  # or "entry_market_iv"
# snapshot_times = "open_close"     # or "close_only"

# ============================================================================
# Trading Costs (Optional)
# ============================================================================
# Uncomment to apply trading costs system-wide
# [trading_costs]
# model = "composite"
#
# [trading_costs.slippage]
# model = "half_spread"
# spread_pct = 0.04  # 4% bid-ask spread
#
# [trading_costs.commission]
# model = "commission"
# per_contract = "0.65"
# max_per_leg = "10.00"

# ============================================================================
# Performance
# ============================================================================
# Enable parallel processing (recommended for large backtests)
parallel = true

# ============================================================================
# Strike Matching
# ============================================================================
# Strike matching mode for calendar/diagonal spreads
# strike_match_mode = "Exact"  # or "Closest"
