# Straddle Strategy: Enter 1 month before earnings, exit 15 days later
# Filters: Market cap > $1 billion
#
# Timing:
#   - Entry: 20 trading days before earnings
#   - Exit: 5 trading days before earnings
#   - Hold: ~15 trading days (20 - 5)
#
# This captures IV expansion before earnings announcement (AMC or BMO)
#
# Note: start_date and end_date must be passed via CLI args (--start --end)

# Strategy configuration
[strategy]
spread_type = "straddle"

# Generic timing specification (NEW - recommended)
timing_strategy = "PreEarnings"
entry_days_before = 20
exit_days_before = 5

# Filter by market cap
min_market_cap = 1_000_000_000  # $1 billion
