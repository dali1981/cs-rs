# Short Straddle Strategy with IV Filtering
#
# Usage:
#   cs backtest --conf configs/short_straddle_iv_filtered.toml --start 2025-11-01 --end 2025-11-30
#
# This strategy:
# - Sells ATM straddles (short call + short put at same strike)
# - Filters for elevated short-term volatility (IV term structure slope)
# - Caps entry at reasonable IV levels to avoid unreliable pricing
# - Targets larger cap stocks for liquidity
#
# Entry Rules:
# - IV7 > IV30 + 5pp (short-term vol elevated relative to long-term)
# - Max entry IV < 150% (avoid extreme volatility mispricing)
# - Market cap > $1 billion (liquidity filter)
# - TODO: Option volume/activity filter (min daily volume, OI, etc.)

# Entry filters (root level)
min_market_cap = 1_000_000_000  # $1 billion
max_entry_iv = 1.5              # 150% - cap at reasonable IV levels

[strategy]
spread_type = "short-straddle"
selection_type = "atm"

[selection]
min_short_dte = 3
max_short_dte = 45

[timing]
# Entry 1 month before earnings
straddle_entry_days = 20
# Exit 5 days before earnings
straddle_exit_days = 5
entry_hour = 9
entry_minute = 35
exit_hour = 15
exit_minute = 55

[pricing]
model = "sticky_strike"
vol_model = "linear"

# Entry rules: Market-level (require market data)
[[rules.market]]
type = "iv_slope"
short_dte = 7
long_dte = 30
threshold_pp = 0.05  # 5pp = 5 percentage points

[[rules.market]]
type = "max_entry_iv"
threshold = 1.5  # 150%

# TODO: Add option activity filter
