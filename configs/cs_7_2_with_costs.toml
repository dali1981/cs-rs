# Calendar Spread Strategy with Trading Costs and Daily Attribution
#
# Based on cs_7_2.toml but adds:
# - Trading costs: 4% half-spread slippage + IBKR commission ($0.65/contract)
# - Daily P&L attribution with open/close snapshots
#
# Usage:
#   cs backtest --conf configs/cs_7_2_with_costs.toml --start 2025-10-01 --end 2025-10-30 --output test_cs_7_2_with_costs.json

min_market_cap = 10_000_000_000  # $10 billion

[strategy]
spread_type = "calendar"
selection_type = "delta"
target_delta = 0.50
wing_width = 10.0

[timing]
timing_strategy = "PreEarnings"
entry_days_before = 7
exit_days_before = 2

[selection]
min_short_dte = 7
max_short_dte = 15
min_long_dte = 15
max_long_dte = 45
min_iv_ratio = 1.5

[pricing]
model = "sticky_strike"
vol_model = "linear"

# Entry rules: Market-level (require market data)
[[rules.market]]
type = "iv_slope"
short_dte = 7
long_dte = 30
threshold_pp = 0.05  # 5pp = 5 percentage points

[[rules.market]]
type = "max_entry_iv"
threshold = 1.5  # 150%

# =============================================================================
# Trading Costs Configuration
# =============================================================================
# Composite model: slippage + commission applied to all trades
[trading_costs]
model = "composite"

# Half-spread slippage (4% bid-ask spread assumption)
# This means we lose 2% on entry (buy at mid + 2%) and 2% on exit (sell at mid - 2%)
[trading_costs.slippage]
model = "half_spread"
spread_pct = 0.04

# IBKR-like commission structure
[trading_costs.commission]
model = "commission"
per_contract = "0.65"
max_per_leg = "10.00"

# =============================================================================
# Attribution Configuration (Daily P&L Breakdown)
# =============================================================================
# Enables Greek-level P&L attribution with daily snapshots
# This will decompose P&L into delta, gamma, theta, vega components daily
[attribution]
enabled = true
# vol_source = "current_market_iv"  # Use current IV for delta calculation
snapshot_times = "open_close"      # Take snapshots at market open and close

# =============================================================================
# Margin Configuration
# =============================================================================
[margin]
mode = "regt"          # off | regt | cash | portfolio-margin
use_maintenance = true

[margin.stock]
stock_margin_mode = "regt"
long_initial_rate = 0.50
short_initial_rate = 1.50
long_maint_rate = 0.50
short_maint_rate = 1.50

[margin.options]
regt_variant = "cboe_like"
