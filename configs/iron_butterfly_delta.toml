# Iron Butterfly with Delta Selection Strategy
#
# Usage:
#   cs backtest --conf iron_butterfly_delta.toml --start 2025-11-01 --end 2025-11-30
#
# This strategy:
# - Sells ATM straddle (both call and put at same strike)
# - Buys protective wings at fixed dollar distance
# - Uses delta targeting to select the optimal entry strike
# - Filters for minimum IV ratio to ensure favorable volatility conditions

min_market_cap = 10_000_000_000  # $1 billion

[strategy]
spread_type = "long-iron-butterfly"
selection_type = "delta"
target_delta = 0.50
wing_width = 10.0

[timing]
timing_strategy = "PreEarnings"
entry_days_before = 5
exit_days_before = 2

[selection]
min_short_dte = 6
max_short_dte = 45
min_long_dte = 14
max_long_dte = 90
min_iv_ratio = 1.5

[pricing]
model = "sticky_strike"
vol_model = "linear"

#[timing]
## Entry 1 month before earnings
#straddle_entry_days = 5
## Exit 5 days before earnings
#straddle_exit_days = 2
#entry_hour = 10
#entry_minute = 00
#exit_hour = 10
#exit_minute = 00

# Entry rules: Market-level (require market data)
[[rules.market]]
type = "iv_slope"
short_dte = 7
long_dte = 30
threshold_pp = 0.05  # 5pp = 5 percentage points

[[rules.market]]
type = "max_entry_iv"
threshold = 1.5  # 150%


  [margin]
  mode = "regt"          # off | regt | cash | portfolio-margin
  use_maintenance = true

  [margin.stock]
  stock_margin_mode = "regt"
  long_initial_rate = 0.50
  short_initial_rate = 1.50
  long_maint_rate = 0.50
  short_maint_rate = 1.50

  [margin.options]
  regt_variant = "cboe_like"
