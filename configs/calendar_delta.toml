# Calendar Spread with Delta Selection Strategy
#
# Usage:
#   cs backtest --conf calendar_delta.toml --start 2025-11-01 --end 2025-11-30 --option-type call
#
# This strategy:
# - Sells short-term option, buys longer-term option at same strike
# - Uses delta targeting to select the optimal strike (0.50 = ATM-ish)
# - Filters for minimum IV ratio to ensure back-month IV > front-month IV
# - Requires --option-type to be specified (call or put)

[strategy]
spread_type = "calendar"
selection_type = "delta"
target_delta = 0.50

[selection]
min_short_dte = 3
max_short_dte = 45
min_long_dte = 14
max_long_dte = 90
min_iv_ratio = 1.5

[pricing]
model = "sticky_strike"
vol_model = "linear"

[timing]
entry_hour = 9
entry_minute = 35
exit_hour = 15
exit_minute = 55
