# Conservative strategy - tighter filters, higher IV ratio threshold
# Usage: cs backtest --conf examples/configs/conservative.toml --start 2024-01-01 --end 2024-06-30

[selection]
min_short_dte = 7
max_short_dte = 21
min_long_dte = 21
max_long_dte = 60
min_iv_ratio = 1.30

[strategy]
type = "delta"
target_delta = 0.50

[pricing]
model = "sticky_strike"
vol_model = "linear"
