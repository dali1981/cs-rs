# Aggressive strategy - high IV ratio threshold, wider delta scan
# Usage: cs backtest --conf examples/configs/aggressive.toml --start 2024-01-01 --end 2024-06-30

[selection]
min_short_dte = 5
max_short_dte = 30
min_long_dte = 21
max_long_dte = 60
min_iv_ratio = 1.25

[strategy]
type = "delta_scan"
target_delta = 0.50
delta_range = [0.25, 0.75]
delta_scan_steps = 10

[pricing]
model = "sticky_moneyness"
vol_model = "svi"
