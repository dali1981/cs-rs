# System-wide configuration for calendar spread backtest
# Place this file at ~/.config/cs/system.toml for system-wide defaults

# Paths - system-specific, rarely change
[paths]
data_dir = "~/polygon/data"
earnings_dir = "~/trading_project/nasdaq_earnings/data"

# Default timing
[timing]
entry_hour = 9
entry_minute = 35
exit_hour = 15
exit_minute = 55

# Default selection criteria
[selection]
min_short_dte = 3
max_short_dte = 45
min_long_dte = 14
max_long_dte = 90

# Default strategy
[strategy]
type = "atm"
target_delta = 0.50
delta_range = [0.25, 0.75]
delta_scan_steps = 5

# Default pricing
[pricing]
model = "sticky_strike"
vol_model = "linear"

# Other defaults
parallel = true
